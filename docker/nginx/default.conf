# Redirecionar HTTP para HTTPS
server {
    listen 80;
    server_name _;

    # Health check acessível via HTTP (para Docker/load balancer)
    location = /up {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
        fastcgi_param REQUEST_URI /up;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Servidor HTTPS principal
server {
    listen 443 ssl;
    server_name _;

    root /var/www/public;
    index index.php index.html;

    # ---------- SSL ----------
    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ---------- Headers de Segurança ----------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # HSTS - só ativar quando tiver certificado real (Let's Encrypt)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ---------- Gzip ----------
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # ---------- Logs ----------
    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;

    # ---------- Esconder versão do servidor ----------
    server_tokens off;

    # ---------- WebSocket Proxy (Socket.io via HTTPS) ----------
    location /socket.io/ {
        proxy_pass http://socket:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # ---------- Rotas ----------
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTPS on;
        fastcgi_param HTTP_HOST $http_host;
    }

    # Bloquear acesso a ficheiros sensíveis
    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~* \.(env|log|git|sql)$ {
        deny all;
    }
}
